<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Archexa graph: triangular node structure matching the brand icon -->
  <!-- Lines connecting nodes -->
  <line x1="12" y1="3" x2="4" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="3" x2="20" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="19" x2="20" y2="19" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="3" x2="12" y2="14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="4" y1="19" x2="12" y2="14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="19" x2="12" y2="14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="12" cy="3" r="2.2" fill="currentColor"/>
  <circle cx="4" cy="19" r="2.5" fill="currentColor"/>
  <circle cx="20" cy="19" r="2" fill="currentColor"/>
  <circle cx="12" cy="14" r="1.8" fill="currentColor"/>
</svg>
